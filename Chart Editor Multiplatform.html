<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FNF Web Chart Editor v9.10 (Audio Separado)</title>
    <style>
        :root {
            --bg-color: #1a1a20; --panel-bg: #2b2b36; --accent: #ff0044; --text-color: #e0e0e0;
            --grid-line: #3a3a48; --beat-line: #6a6a80;
        }

        body {
            margin: 0; background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh;
            overflow: hidden; flex-direction: row; touch-action: none;
        }

        #js-warning {
            position: absolute; top: 0; left: 0; width: 100%; background: #ff0044;
            color: white; font-weight: bold; text-align: center; padding: 15px; z-index: 9999;
        }

        .sidebar {
            width: 280px; background-color: var(--panel-bg); padding: 15px;
            box-shadow: 2px 0 15px rgba(0,0,0,0.8); display: flex; flex-direction: column;
            gap: 12px; z-index: 50; overflow-y: auto; user-select: none;
        }

        h2 { font-size: 1.1rem; margin: 0; border-bottom: 2px solid var(--accent); padding-bottom: 5px; }
        .control-group { display: flex; flex-direction: column; gap: 4px; font-size: 0.9em; }
        .audio-controls { background: #1e1e24; padding: 10px; border-radius: 8px; border: 1px solid var(--beat-line); }

        input, select { 
            background: var(--bg-color); border: 1px solid var(--grid-line); 
            color: white; padding: 8px; border-radius: 4px; font-size: 1em; 
        }
        
        #songNameInput {
            background-color: #1a2a3a; border: 2px solid #00ffff;
            color: #00ffff; font-weight: bold; font-size: 1.1em;
        }

        button { 
            background-color: var(--accent); color: white; border: none; 
            padding: 12px; border-radius: 5px; cursor: pointer; 
            font-weight: bold; -webkit-tap-highlight-color: rgba(255,255,255,0.2); font-size: 1em;
        }
        button:active { transform: scale(0.95); opacity: 0.8; }
        
        #statusBox { background: #15151b; padding: 10px; border-left: 4px solid #aaa; font-size: 0.85em; border-radius: 0 4px 4px 0; word-wrap: break-word; }
        .hidden-input { display: none; }

        .export-box {
            background: #1e1e24; padding: 10px; border-radius: 8px;
            border: 1px solid #444; display: flex; flex-direction: column; gap: 8px; margin-top: auto;
        }

        .chart-area {
            flex-grow: 1; display: flex; justify-content: center;
            position: relative; background-color: #111; touch-action: none; z-index: 10;
        }
        canvas { box-shadow: 0 0 20px rgba(0,0,0,0.8); background: linear-gradient(180deg, #181818 0%, #0a0a0a 100%); touch-action: none; }

        @media (max-width: 768px) {
            body { flex-direction: column; } 
            .sidebar { width: 100%; height: 50vh; display: block; padding-bottom: 20px; border-bottom: 2px solid #444; }
            .sidebar > div, .sidebar > button, .sidebar > input { width: 100%; margin-bottom: 8px; box-sizing: border-box; }
            .chart-area { height: 50vh; }
            #touchModeBtn { display: block; background-color: #ffcc00; color: black; }
        }
        @media (min-width: 769px) { #touchModeBtn { display: none; } }
    </style>
</head>
<body>

    <div id="js-warning">🚨 ERROR: El navegador bloqueó el código. Sube este archivo a un hosting web o usa Chrome.</div>

    <aside class="sidebar">
        <h2>Editor FNF v9.10</h2>
        
        <div class="audio-controls control-group">
            <div style="display: flex; gap: 5px;">
                <button id="loadAudioBtn" style="background-color: #ffaa00; color: black; flex: 1;">📂 Cargar Audio</button>
                <button id="playBtn" style="background-color: #12fa05; color: black; flex: 1;">▶ Play</button>
            </div>
            <input type="file" id="audioInput" accept="audio/*" class="hidden-input">
            <div id="timeDisplay" style="text-align: center; font-family: monospace; font-size: 1.1em; margin-top: 5px;">00:00.000</div>
        </div>

        <button id="touchModeBtn">↕️ Modo: Navegar</button>

        <div class="control-group" style="flex-direction: row; gap: 5px;">
            <div style="flex: 2;">
                <label>🎵 Nombre de Canción</label>
                <input type="text" id="songNameInput" value="tu-cancion" style="width: 100%;">
            </div>
            <div style="flex: 1;">
                <label>Dificultad</label>
                <input type="text" id="diffInput" value="hard" style="width: 100%;">
            </div>
        </div>

        <div class="control-group" style="flex-direction: row; gap: 10px;">
            <div style="flex: 1;"><label>BPM</label><input type="number" id="bpmInput" value="140" min="10" style="width: 100%;"></div>
            <div style="flex: 1;"><label>Sustain (ms)</label><input type="number" id="sustainInput" value="0" min="0" step="10" style="width: 100%;"></div>
        </div>

        <div class="control-group">
            <label>Zoom</label>
            <input type="range" id="zoomInput" min="1" max="5" value="2" step="0.5">
        </div>

        <button id="importBtn" style="background-color: #00ffff; color: black;">📂 Importar Chart</button>
        <input type="file" id="jsonInput" accept=".json" class="hidden-input">
        
        <div id="statusBox">🟢 Listo. Usa los dedos/mouse.</div>

        <div class="export-box">
            <label style="font-size: 0.9em; font-weight: bold;">Formato:</label>
            <select id="exportFormat">
                <option value="vslice">V-Slice (v2.0.0)</option>
                <option value="psych">Psych Engine (0.7.3+)</option>
            </select>
            <button id="exportBtn" style="background-color: #ff0044;">💾 Descargar Archivo</button>
        </div>
    </aside>

    <main class="chart-area" id="chartArea">
        <canvas id="gridCanvas" width="320"></canvas>
    </main>

    <script>
        document.getElementById('js-warning').style.display = 'none';

        window.onerror = function(msg, url, line) {
            document.getElementById('statusBox').innerText = `❌ Error L${line}: ${msg}`;
            document.getElementById('statusBox').style.borderLeftColor = '#ff0044';
            return false;
        };

        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        const bpmInput = document.getElementById('bpmInput');
        const zoomInput = document.getElementById('zoomInput');
        const sustainInput = document.getElementById('sustainInput');
        const songNameInput = document.getElementById('songNameInput');
        const diffInput = document.getElementById('diffInput');
        const audioInput = document.getElementById('audioInput');
        const loadAudioBtn = document.getElementById('loadAudioBtn');
        const playBtn = document.getElementById('playBtn');
        const timeDisplay = document.getElementById('timeDisplay');
        const jsonInput = document.getElementById('jsonInput');
        const exportFormat = document.getElementById('exportFormat');
        const touchModeBtn = document.getElementById('touchModeBtn');
        const statusBox = document.getElementById('statusBox');
        
        let bpm = 140; let zoom = 2;
        const lanes = 8; const laneWidth = canvas.width / lanes; const strumLineY = 60;
        let notes = []; 
        let originalEvents = []; 
        const noteColors = ['#c24b99', '#00ffff', '#12fa05', '#f9393f'];

        const audio = new Audio();
        let isPlaying = false; let currentTimeMs = 0; let animationFrameId;
        let isDrawing = false; let drawAction = 'add'; 
        let lastSnappedTime = -1; let lastClickedLane = -1;
        let touchMode = 'scroll'; 

        function setStatus(msg) { statusBox.innerText = msg; }

        function resizeCanvas() {
            canvas.height = document.getElementById('chartArea').clientHeight;
            drawGrid();
        }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 200);

        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let stepCrochet = (60000 / bpm) / 4;
            let pixelsPerStep = (stepCrochet / 10) * zoom;

            let startStep = Math.floor((currentTimeMs - (strumLineY / pixelsPerStep) * stepCrochet) / stepCrochet);
            let endStep = startStep + Math.ceil(canvas.height / pixelsPerStep) + 2;

            for (let step = startStep; step <= endStep; step++) {
                if (step < 0) continue;
                let y = strumLineY + (((step * stepCrochet) - currentTimeMs) / stepCrochet) * pixelsPerStep;
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y);
                ctx.strokeStyle = (step % 4 === 0) ? '#6a6a80' : '#3a3a48';
                ctx.lineWidth = (step % 4 === 0) ? 2 : 1; ctx.stroke();
            }

            for (let i = 1; i < lanes; i++) {
                ctx.beginPath(); ctx.moveTo(i * laneWidth, 0); ctx.lineTo(i * laneWidth, canvas.height);
                ctx.strokeStyle = (i === 4) ? '#ff0044' : '#3a3a48'; ctx.stroke();
            }

            notes.forEach(note => {
                let noteY = strumLineY + ((note.t - currentTimeMs) / stepCrochet) * pixelsPerStep;
                
                if (note.l > 0) {
                    let susHeight = (note.l / stepCrochet) * pixelsPerStep;
                    ctx.fillStyle = noteColors[note.d % 4] + '80';
                    ctx.fillRect(note.d * laneWidth + laneWidth/4, noteY, laneWidth/2, susHeight);
                }

                if (noteY > -50 && noteY < canvas.height + 50) {
                    ctx.fillStyle = noteColors[note.d % 4];
                    ctx.fillRect(note.d * laneWidth + 2, noteY - 10, laneWidth - 4, 20);
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
                    ctx.strokeRect(note.d * laneWidth + 2, noteY - 10, laneWidth - 4, 20);
                }
            });

            ctx.fillStyle = '#2b2b36'; ctx.fillRect(0, 0, canvas.width, strumLineY);
            ctx.beginPath(); ctx.moveTo(0, strumLineY); ctx.lineTo(canvas.width, strumLineY);
            ctx.strokeStyle = '#fff'; ctx.stroke();

            let totalSec = Math.floor(currentTimeMs / 1000);
            timeDisplay.innerText = `${Math.floor(totalSec / 60).toString().padStart(2, '0')}:${(totalSec % 60).toString().padStart(2, '0')}.${Math.floor(currentTimeMs % 1000).toString().padStart(3, '0')}`;
        }

        function loop() {
            if (isPlaying) { currentTimeMs = audio.currentTime * 1000; drawGrid(); animationFrameId = requestAnimationFrame(loop); }
        }

        function processInput(x, y, isDrag) {
            if (isPlaying) return;
            let stepCrochet = (60000 / bpm) / 4;
            let pixelsPerStep = (stepCrochet / 10) * zoom;
            const clickedLane = Math.floor(x / laneWidth);
            
            if(clickedLane < 0 || clickedLane >= lanes) return;

            let exactTime = currentTimeMs + ((y - strumLineY) / pixelsPerStep) * stepCrochet;
            let snappedTime = Math.round(exactTime / stepCrochet) * stepCrochet;
            if(snappedTime < 0) return;

            if (isDrag && snappedTime === lastSnappedTime && clickedLane === lastClickedLane) return;
            lastSnappedTime = snappedTime; lastClickedLane = clickedLane;

            const existingIdx = notes.findIndex(n => n.d === clickedLane && Math.abs(n.t - snappedTime) < 10);
            if (!isDrag) drawAction = existingIdx !== -1 ? 'remove' : 'add';

            if (drawAction === 'remove' && existingIdx !== -1) notes.splice(existingIdx, 1);
            else if (drawAction === 'add' && existingIdx === -1) {
                let susLen = parseFloat(sustainInput.value) || 0;
                let newNote = { d: clickedLane, t: snappedTime };
                if (susLen > 0) newNote.l = susLen;
                notes.push(newNote);
            }
            drawGrid();
        }

        let startY = 0;
        
        canvas.addEventListener('pointerdown', (e) => {
            if(isPlaying) return;
            startY = e.clientY;
            if(touchMode === 'draw' || e.pointerType === 'mouse') {
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                processInput(e.clientX - rect.left, e.clientY - rect.top, false);
            }
        });

        canvas.addEventListener('pointermove', (e) => {
            if(isPlaying) return;
            if(touchMode === 'scroll' && e.pointerType !== 'mouse' && e.buttons > 0) {
                let deltaY = e.clientY - startY;
                currentTimeMs -= deltaY * 3;
                if(currentTimeMs < 0) currentTimeMs = 0;
                startY = e.clientY;
                drawGrid();
            } else if (isDrawing) {
                const rect = canvas.getBoundingClientRect();
                processInput(e.clientX - rect.left, e.clientY - rect.top, true);
            }
        });

        window.addEventListener('pointerup', () => { isDrawing = false; });

        touchModeBtn.addEventListener('click', () => {
            touchMode = (touchMode === 'scroll') ? 'draw' : 'scroll';
            touchModeBtn.innerText = touchMode === 'draw' ? '✏️ Modo: Dibujar' : '↕️ Modo: Navegar';
            touchModeBtn.style.backgroundColor = touchMode === 'draw' ? '#00ffff' : '#ffcc00';
        });

        loadAudioBtn.addEventListener('click', () => {
            audioInput.click();
        });

        playBtn.addEventListener('click', () => {
            if (!audio.src) { 
                setStatus("⚠️ Primero carga un audio usando el botón naranja."); 
                return; 
            }
            if (audio.paused) {
                audio.currentTime = currentTimeMs / 1000; audio.play(); isPlaying = true;
                playBtn.innerText = '⏸ Pausa'; playBtn.style.backgroundColor = '#ffcc00'; loop();
            } else {
                audio.pause(); isPlaying = false;
                playBtn.innerText = '▶ Play'; playBtn.style.backgroundColor = '#12fa05'; cancelAnimationFrame(animationFrameId);
            }
        });

        audioInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                audio.src = URL.createObjectURL(e.target.files[0]);
                setStatus("✅ Audio cargado."); playBtn.innerText = '▶ Play';
            }
        });

        document.getElementById('importBtn').addEventListener('click', () => jsonInput.click());
        
        jsonInput.addEventListener('change', (e) => {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    const data = JSON.parse(evt.target.result);
                    
                    if (data.song && data.song.notes) {
                        notes = []; data.song.notes.forEach(sec => {
                            if(sec.sectionNotes) sec.sectionNotes.forEach(n => {
                                let d = n[1]%8; if(sec.mustHitSection) d = d<4 ? d+4 : d-4;
                                let newNote = {t: n[0], d: d};
                                if (n[2] > 0) newNote.l = n[2]; 
                                notes.push(newNote);
                            });
                        });
                        if(data.song.bpm) bpmInput.value = data.song.bpm;
                        if(data.song.song) songNameInput.value = data.song.song;
                        bpm = bpmInput.value; setStatus("✅ Chart Psych importado"); drawGrid();
                    } 
                    else if (data.notes) {
                        let diffNames = Object.keys(data.notes);
                        let importedNotes = [];
                        
                        if(data.notes.hard) { importedNotes = data.notes.hard; diffInput.value = "hard"; }
                        else if(data.notes.normal) { importedNotes = data.notes.normal; diffInput.value = "normal"; }
                        else if(data.notes.easy) { importedNotes = data.notes.easy; diffInput.value = "easy"; }
                        else if(diffNames.length > 0) { importedNotes = data.notes[diffNames[0]]; diffInput.value = diffNames[0]; }
                        else if (Array.isArray(data.notes)) { importedNotes = data.notes; }

                        notes = importedNotes;
                        originalEvents = data.events || []; 
                        setStatus("✅ Chart V-Slice importado"); drawGrid();
                    }
                } catch(err) { setStatus("❌ Error JSON"); }
            };
            reader.readAsText(file);
        });

        document.getElementById('exportBtn').addEventListener('click', () => {
            let format = exportFormat.value;
            let validNotes = notes.sort((a, b) => a.t - b.t);
            let safeName = songNameInput.value.toLowerCase().replace(/\s+/g, '-');
            let difficulty = diffInput.value.toLowerCase().replace(/[^a-z0-9]/g, '');
            if(!difficulty) difficulty = "hard";

            const downloadJSON = (dataObj, fileName) => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dataObj, null, 2));
                const dl = document.createElement('a');
                dl.href = dataStr;
                dl.download = fileName;
                document.body.appendChild(dl);
                dl.click();
                document.body.removeChild(dl);
            };

            if (format === "vslice") {
                // Generar Chart
                const vSliceChart = {
                    version: "2.0.0",
                    scrollSpeed: { [difficulty]: 3 },
                    events: originalEvents,
                    notes: { [difficulty]: validNotes }
                };

                // Generar Metadata
                const vSliceMetadata = {
                    version: "2.2.0",
                    songName: songNameInput.value,
                    artist: "Unknown",
                    looped: false,
                    offsets: { instrumental: 0, altInstrumentals: {}, vocals: {} },
                    playData: {
                        album: "volume1",
                        previewStart: 0,
                        previewEnd: 15000,
                        songVariations: [],
                        difficulties: [ difficulty ],
                        characters: {
                            album: "volume1", player: "bf", girlfriend: "gf", opponent: "dad",
                            instrumental: "", altInstrumentals: []
                        },
                        stage: "stage",
                        noteStyle: "funkin",
                        ratings: {}
                    },
                    timeFormat: "ms",
                    timeChanges: [
                        { t: 0, b: 0, bpm: parseFloat(bpm), n: 4, d: 4, bt: [4, 4, 4, 4] }
                    ],
                    generatedBy: "FNF Web Chart Editor v9.10"
                };

                downloadJSON(vSliceChart, `${safeName}-chart.json`);
                setTimeout(() => {
                    downloadJSON(vSliceMetadata, `${safeName}-metadata.json`);
                    setStatus(`💾 Exportados: ${safeName}-chart.json y ${safeName}-metadata.json`);
                }, 300);

            } else {
                let stepCrochet = (60000 / bpm) / 4;
                let psychSections = [];
                let maxTime = validNotes.length > 0 ? validNotes[validNotes.length - 1].t : 0;
                f
